brokerClusterName = SecondCluster
brokerName = broker-b
brokerId = 0
# 替换为宿主机 IP（如 192.168.1.100），或注释掉使用自动检测
brokerIP1 = 192.168.115.156
namesrvAddr = namesrv2:9876
defaultTopicQueueNums = 4
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true
listenPort = 11911
enableCalcDelayOffset = true  # 启用任意延时消息（5.x 关键配置）
storePathRootDir = /home/rocketmq/store
storePathCommitLog = /home/rocketmq/store/commitlog
storePathConsumeQueue = /home/rocketmq/store/consumequeue
flushDiskType = ASYNC_FLUSH  # 异步刷盘，提升性能
